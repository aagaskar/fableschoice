name: ci
on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Engine and story tests
        run: node --test
      - name: Compile and model-check the fable
        run: node build.js --check
      - name: Press the book and confirm dist is current
        run: |
          node build.js
          git diff --exit-code dist/ || {
            echo '::error::dist/index.html is stale — run `node build.js` and commit it'; exit 1; }
