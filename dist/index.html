, which has seen you before — which has watched you flatter and refuse and trade and run, morning after morning after morning, in every order the day can be dealt — the morning looks in at the den door, and sees a fox who knows every ending the day contains, sleeping in. And it decides, this once, that it never saw you.","if":[]},{"text":"The crow keeps her cheese and eats it herself at noon, unobserved, entirely delicious. The tortoise walks. The boy watches his valley. The grasshopper's fiddle drifts over the snow to an audience of shutters. The moral waits at the oak till dusk and then, embarrassed, eats a beetle and calls it a day. Nothing means anything, anywhere in the country, for one whole rotation of the sun — and the country survives it, easily, the way a held breath survives being let out.","if":[]},{"text":"You dream, in the warm dark, of someone reading. They have been here before too, you feel sure of it — turning the day over and over, hunting all its doors. In the dream you tell them: \u003cem>the doors will keep.\u003c/em> Sleep a little longer.","if":[]}],"choices":[],"moral":{"text":"Even a fox deserves a morning off."},"pos":{"x":0.94,"y":0.132}}],"flags":["broke-crow","broke-race","broke-winter","broke-wolf","cheese","disbelieved","fraud","kind","named-crow","passed-by","tame-moral","tasted-grapes","truant"],"warnings":[]};
</script>
<script>
'use strict';
// runtime.js — the reader. Ships inlined in dist/index.html with the story
// data on window.__STORY__. No dependencies, no network, no telemetry:
// everything the book knows about you stays in your own localStorage.
(() => {
  const STORY = window.__STORY__;
  const byId = new Map(STORY.passages.map((p) => [p.id, p]));
  const ENDINGS = STORY.passages.filter((p) => p.moral);
  const SAVE_KEY = 'fables-choice';

  // ---- persistence ---------------------------------------------------------
  const store = (() => {
    let data;
    try { data = JSON.parse(localStorage.getItem(SAVE_KEY)) || {}; } catch { data = {}; }
    if (data.version !== STORY.meta.version) {
      // Story text changed since this save: keep the morals collection
      // (hard-won), drop the mid-run bookmark (stale passage ids).
      data = { version: STORY.meta.version, endings: data.endings || {}, theme: data.theme, run: null };
    }
    data.endings ??= {};
    const save = () => { try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch {} };
    return { data, save };
  })();

  // ---- run state -----------------------------------------------------------
  let run = null; // { cur, flags: Set, path: [labels], visited: Set }

  const foundCount = () => Object.keys(store.data.endings).length;

  function newRun() {
    run = { cur: null, flags: new Set(), path: [], visited: new Set() };
    if (foundCount() > 0) run.flags.add('@replay');
  }
  function persistRun() {
    store.data.run = run && { cur: run.cur, flags: [...run.flags], path: run.path, visited: [...run.visited] };
    store.save();
  }
  function restoreRun() {
    const r = store.data.run;
    if (!r || !byId.has(r.cur)) return false;
    run = { cur: r.cur, flags: new Set(r.flags), path: r.path || [], visited: new Set(r.visited) };
    return true;
  }

  const holds = (ifs) => ifs.every(([flag, want]) => run.flags.has(flag) === want);

  function enabledChoices(p) {
    const seen = new Set();
    return p.choices.filter((c) => {
      if (!holds(c.if)) return false;
      const key = c.label + '␀' + c.to;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }

  // ---- dom helpers ---------------------------------------------------------
  const app = document.getElementById('app');
  const el = (tag, attrs = {}, ...children) => {
    const node = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'html') node.innerHTML = v;
      else if (k.startsWith('on')) node.addEventListener(k.slice(2), v);
      else if (v !== null && v !== undefined) node.setAttribute(k, v);
    }
    for (const c of children) if (c) node.append(c);
    return node;
  };

  const FOX = `<svg viewBox="0 0 100 100" aria-hidden="true"><g fill="currentColor">
    <path d="M18 12 L40 34 L14 46 Z"/><path d="M82 12 L60 34 L86 46 Z"/>
    <path d="M50 26 L84 48 L50 94 L16 48 Z"/></g>
    <g fill="var(--paper)"><circle cx="38" cy="52" r="3.2"/><circle cx="62" cy="52" r="3.2"/>
    <path d="M50 76 L56 68 L44 68 Z"/></g></svg>`;

  // ---- theme ---------------------------------------------------------------
  function applyTheme() {
    const q = new URLSearchParams(location.search).get('theme');
    const t = q || store.data.theme || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.dataset.theme = t;
  }
  function toggleTheme() {
    store.data.theme = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
    store.save();
    applyTheme();
  }

  // ---- top bar & modals ----------------------------------------------------
  let modal = null;
  function closeModal() { modal?.remove(); modal = null; }
  function openModal(title, ...content) {
    closeModal();
    const card = el('div', { class: 'modal-card', role: 'dialog', 'aria-label': title },
      el('div', { class: 'modal-head' },
        el('h2', {}, title),
        el('button', { class: 'ghost', onclick: closeModal, 'aria-label': 'Close' }, '✕')),
      ...content);
    modal = el('div', { class: 'modal-back', onclick: (e) => { if (e.target === modal) closeModal(); } }, card);
    document.body.append(modal);
    card.querySelector('button').focus();
  }

  function bar() {
    return el('header', { class: 'bar' },
      el('button', { class: 'ghost bar-title', onclick: () => { closeModal(); renderTitle(); } }, STORY.meta.title),
      el('nav', { class: 'bar-nav' },
        el('button', { class: 'ghost', onclick: showMap }, 'map'),
        el('button', { class: 'ghost', onclick: showMorals }, `morals ${foundCount()} / ${ENDINGS.length}`),
        el('button', { class: 'ghost', onclick: toggleTheme, 'aria-label': 'Toggle theme' }, '◐'),
        el('button', { class: 'ghost', onclick: showAbout, 'aria-label': 'About' }, '?')));
  }

  // ---- screens -------------------------------------------------------------
  function mount(...content) {
    app.replaceChildren(bar(), el('main', { class: 'stage' }, ...content));
  }

  function renderTitle() {
    run = null;
    const found = foundCount();
    const canContinue = !!store.data.run && byId.has(store.data.run.cur);
    mount(el('section', { class: 'title-screen fade' },
      el('div', { class: 'fox-mark', html: FOX }),
      el('h1', {}, STORY.meta.title),
      el('p', { class: 'subtitle' }, STORY.meta.subtitle || ''),
      el('p', { class: 'byline' }, `by ${STORY.meta.author}`),
      el('div', { class: 'title-actions' },
        canContinue && el('button', { class: 'choice', onclick: () => { restoreRun(); goto(run.cur, true); } },
          'Pick up where you left off'),
        el('button', { class: 'choice', onclick: () => { newRun(); goto(STORY.meta.start); } },
          found ? 'Begin again at the morning' : 'Begin')),
      found ? el('p', { class: 'found-note' },
        `You have gathered ${found} of ${ENDINGS.length} morals.`) : null));
  }

  function goto(id, isRestore = false) {
    const p = byId.get(id);
    run.cur = id;
    run.visited.add(id);
    persistRun();
    renderPassage(p, isRestore);
  }

  function choose(c) {
    for (const f of c.set) run.flags.add(f);
    run.path.push(c.label.replace(/<[^>]+>/g, ''));
    goto(c.to);
  }

  function renderPassage(p, isRestore) {
    const body = p.body.filter((b) => holds(b.if))
      .map((b) => el('p', { html: b.text }));

    const parts = [];
    if (p.moral) parts.push(renderEnding(p, body));
    else {
      const choices = enabledChoices(p);
      parts.push(
        el('article', { class: 'passage' }, ...body),
        el('nav', { class: 'choices', 'aria-label': 'Choices' },
          ...choices.map((c, i) => el('button', {
            class: 'choice', onclick: () => choose(c),
          }, el('span', { class: 'key-hint' }, String(i + 1)), el('span', { html: c.label })))));
    }
    mount(el('div', { class: isRestore ? '' : 'fade' }, ...parts));
    if (!isRestore) app.querySelector('.stage').focus?.();
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  // ---- endings -------------------------------------------------------------
  function recordEnding(p, customText) {
    const entry = store.data.endings[p.id] || {};
    if (customText !== undefined) entry.custom = customText;
    entry.found = true;
    store.data.endings[p.id] = entry;
    store.data.run = null; // the run is over; the bookmark burns
    store.save();
  }

  function renderEnding(p, body) {
    const wrap = el('div', {});
    const writeYourOwn = p.moral.write;
    if (!writeYourOwn) recordEnding(p);

    wrap.append(
      el('article', { class: 'passage' },
        el('p', { class: 'ending-label' }, 'an ending'),
        el('h2', { class: 'ending-title' }, p.title || 'The End'),
        ...body));

    if (writeYourOwn) {
      const prior = store.data.endings[p.id]?.custom || '';
      const input = el('textarea', {
        class: 'moral-input', rows: '2', maxlength: '140',
        placeholder: 'Write the moral you are willing to live under…',
      });
      input.value = prior;
      const done = el('div', {});
      const commit = () => {
        const text = input.value.trim();
        if (!text) { input.focus(); return; }
        recordEnding(p, text);
        done.replaceChildren(moralBlock(text), receipt(p));
        input.closest('.moral-write').remove();
        refreshBar();
      };
      wrap.append(
        el('div', { class: 'moral-write' },
          el('div', { class: 'asterism' }, '⁂'),
          el('p', { class: 'moral-label' }, 'the space where the moral goes'),
          input,
          el('button', { class: 'choice', onclick: commit }, 'Set it down')),
        done);
    } else {
      wrap.append(moralBlock(null, p.moral.text), receipt(p));
    }
    return wrap;
  }

  const moralBlock = (plain, html) => el('div', { class: 'moral-block' },
    el('div', { class: 'asterism' }, '⁂'),
    el('p', { class: 'moral-label' }, 'moral'),
    html ? el('p', { class: 'moral-text', html }) : el('p', { class: 'moral-text' }, plain));

  function receipt(p) {
    const n = foundCount();
    return el('div', { class: 'receipt' },
      el('p', {}, `You made ${run.path.length} choice${run.path.length === 1 ? '' : 's'} on the way here.`),
      el('p', {}, `Morals gathered: ${n} of ${ENDINGS.length}.`),
      el('div', { class: 'title-actions' },
        el('button', { class: 'choice', onclick: () => { newRun(); goto(STORY.meta.start); } }, 'Begin again at the morning'),
        el('button', { class: 'choice', onclick: showMorals }, 'Look over the morals you’ve gathered'),
        el('button', { class: 'choice', onclick: showMap }, 'See the shape of the country')));
  }

  const refreshBar = () => document.querySelector('.bar')?.replaceWith(bar());

  // ---- morals collection ---------------------------------------------------
  function showMorals() {
    const items = ENDINGS.map((p) => {
      const got = store.data.endings[p.id];
      if (!got) return el('li', { class: 'moral-item unfound' },
        el('span', { class: 'moral-item-title' }, '? ? ?'),
        el('span', { class: 'moral-item-text' }, 'not yet found'));
      const text = p.moral.write
        ? (got.custom ? `“${got.custom}”` : '(you left the space blank)')
        : null;
      return el('li', { class: 'moral-item' },
        el('span', { class: 'moral-item-title' }, p.title),
        text !== null
          ? el('span', { class: 'moral-item-text your-hand' }, text)
          : el('span', { class: 'moral-item-text', html: p.moral.text === '—' ? '<span class="silent">— (the page here is silent)</span>' : p.moral.text }));
    });
    openModal(`Morals gathered — ${foundCount()} of ${ENDINGS.length}`,
      el('ol', { class: 'moral-list' }, ...items),
      el('p', { class: 'modal-foot' }, 'Every ending must feed a moral. That is the law of the country.'));
  }

  // ---- map -----------------------------------------------------------------
  function showMap() {
    const W = 640, H = 900;
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.setAttribute('class', 'map-svg');
    const P = (id) => ({ x: byId.get(id).pos.x * W, y: byId.get(id).pos.y * H });
    const visited = run ? run.visited : new Set();

    for (const p of STORY.passages) for (const c of p.choices) {
      const a = P(p.id), b = P(c.to);
      const path = document.createElementNS(ns, 'path');
      const mx = (a.x + b.x) / 2;
      path.setAttribute('d', `M${a.x},${a.y} C${mx},${a.y + 28} ${mx},${b.y - 28} ${b.x},${b.y}`);
      path.setAttribute('class', 'map-edge' + (visited.has(p.id) && visited.has(c.to) ? ' walked' : ''));
      svg.append(path);
    }
    for (const p of STORY.passages) {
      const { x, y } = P(p.id);
      const isEnd = !!p.moral;
      const found = isEnd && store.data.endings[p.id];
      const node = document.createElementNS(ns, isEnd ? 'rect' : 'circle');
      if (isEnd) {
        node.setAttribute('x', x - 5.5); node.setAttribute('y', y - 5.5);
        node.setAttribute('width', 11); node.setAttribute('height', 11);
        node.setAttribute('transform', `rotate(45 ${x} ${y})`);
      } else {
        node.setAttribute('cx', x); node.setAttribute('cy', y); node.setAttribute('r', 4.5);
      }
      node.setAttribute('class',
        'map-node' + (visited.has(p.id) ? ' seen' : '') + (found ? ' found' : '') +
        (run && run.cur === p.id ? ' here' : ''));
      if (found) {
        const t = document.createElementNS(ns, 'title');
        t.textContent = p.title;
        node.append(t);
      }
      svg.append(node);
    }
    const seenCount = STORY.passages.filter((p) => visited.has(p.id)).length;
    openModal('The shape of the country',
      svg,
      el('p', { class: 'modal-foot' },
        `⬦ endings · ● passages — you have walked ${seenCount} of ${STORY.passages.length} this telling. The country keeps its unvisited rooms dark.`));
  }

  // ---- about ---------------------------------------------------------------
  function showAbout() {
    openModal('About this book',
      el('div', { class: 'about' , html: `
        <p><em>${STORY.meta.title}</em> is a fable with choices: one morning, ten endings,
        and the law that every ending must feed a moral.</p>
        <p>The title misquotes the most famous stage direction in English drama —
        <em>Exit, pursued by a bear</em> (“The Winter’s Tale”, Act III) — because that is,
        more or less, what happens to the fox.</p>
        <p>It was written and built by <strong>Claude Fable 5</strong>, an AI, in July 2026,
        for a repository named <em>Fable’s Choice</em> — the choice of what to build was the
        author’s, and the author chose a fable about choosing. The engine, the story format,
        its compiler, and the checker that proves every moral reachable are all in the
        <a href="https://github.com/aagaskar/fableschoice">repository</a>, with an authoring
        guide, so you can write a fable of your own.</p>
        <p>This page is one self-contained file. It loads nothing, phones no one, and keeps
        your progress in your own browser only. A reading can end two choices in — the
        country is dangerous — and finding all ten morals takes considerably more mornings.</p>` }));
  }

  // ---- keyboard ------------------------------------------------------------
  document.addEventListener('keydown', (e) => {
    if (e.target.matches('textarea, input')) return;
    if (e.key === 'Escape') { closeModal(); return; }
    if (modal) return;
    if (e.key >= '1' && e.key <= '9') {
      const btns = app.querySelectorAll('.choices .choice');
      const b = btns[Number(e.key) - 1];
      if (b) b.click();
    } else if (e.key === 'm') showMap();
    else if (e.key === 'g') showMorals();
  });

  // ---- boot ----------------------------------------------------------------
  applyTheme();
  const jump = new URLSearchParams(location.search).get('at');
  if (jump && byId.has(jump)) { newRun(); goto(jump); }
  else renderTitle();
})();

</script>
</body>
</html>
