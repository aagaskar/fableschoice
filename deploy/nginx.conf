# Fable's Choice — nginx server block.
# Adjust server_name and root, then include from your nginx config
# (e.g. /etc/nginx/conf.d/fables-choice.conf) and `nginx -s reload`.
#
# The site is one self-contained HTML file: no external scripts, styles,
# fonts, or images, so the Content-Security-Policy below can stay strict.
# For TLS, front this with certbot --nginx as usual.

server {
    listen 80;
    listen [::]:80;
    server_name fable.example.com;          # <- your (sub)domain

    root /var/www/fables-choice;
    index index.html;

    gzip on;
    gzip_types text/html;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ /index.html;
        # Short cache: the book is one file, redeploys should show up quickly.
        add_header Cache-Control "public, max-age=300";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        # Inline-only by design; nothing external may load, nothing may connect out.
        add_header Content-Security-Policy "default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:; base-uri 'none'; form-action 'none'; frame-ancestors 'self'" always;
    }
}
